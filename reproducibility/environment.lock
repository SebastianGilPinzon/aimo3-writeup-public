# AIMO3 Writeup — frozen environment specification (Section 3.1)
# This file describes the exact environment under which submission
# "sebastiangil00/aimo3-v7-winner-fork Version 12" (public 42, private 42)
# was executed on 2026-03-29.

[hardware]
gpu = "NVIDIA H100 80GB HBM3"
compute_capability = "9.0"
min_driver = "535.86.10"
cuda_runtime = "12.2"

[container]
docker_image = "gcr.io/kaggle-private-byod/python"
docker_image_sha256 = "00377cd1b3d470a605bc5b0ceca79969e369644e9b36802242a1c70e627372f9"

[python]
version = "3.11"

[models]
gpt_oss_120b_kaggle_ref = "danielhanchen/gpt-oss-120b/Transformers/default/1"
gpt_oss_120b_quant_scope = "MoE expert projections in MXFP4; attention + router in BF16"
gpt_oss_120b_sha_manifest = "model_weights.sha256"

[vllm]
version = "0.11.2"
wheel_source = "kagglehub: andreasbis/aimo-3-utils"
command = """
python -m vllm.entrypoints.openai.api_server \
  --model <GPT_OSS_PATH> \
  --served-model-name gpt-oss \
  --dtype auto \
  --quantization mxfp4 \
  --kv-cache-dtype fp8_e4m3 \
  --max-model-len 65536 \
  --gpu-memory-utilization 0.94 \
  --trust-remote-code \
  --tensor-parallel-size 1 \
  --host 127.0.0.1 \
  --port 8000 \
  --disable-log-stats
"""

[pipeline]
workers = 8
attempts = 8
early_stop = 4
temperature = 1.0
min_p = 0.02
top_k = -1
top_logprobs = 5
max_model_len = 65536
buffer_tokens = 512
search_tokens = 32
base_problem_timeout_s = 300
high_problem_timeout_s = 900
session_timeout_s = 960
jupyter_timeout_s = 6
sandbox_timeout_s = 3
stream_interval_tokens = 200

[modes]
# Mode A: strict bitwise reproduction
strict = { seed = 42, PYTHONHASHSEED = "42", CUBLAS_WORKSPACE_CONFIG = ":4096:8", torch_deterministic_algorithms = true }
# Mode B: stochastic-faithful (matches actual submission)
stochastic = { seed = "int(time.time())", PYTHONHASHSEED = "<system default>", torch_deterministic_algorithms = false }

[dependencies_summary]
# Full `pip freeze` is in pip_freeze.lock (~350 lines).
# Core deps:
openai_harmony = "bundled with aimo-3-utils wheel"
jupyter_client = "bundled with aimo-3-utils wheel"
sympy = "bundled"
mpmath = "bundled (precision: mpmath.mp.dps = 64)"
